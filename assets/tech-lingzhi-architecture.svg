<text x="60" y="104" font-family="Arial Unicode MS, PingFang SC, sans-serif" font-size="15" fill="#60716b">微信小程序 + 云开发云函数：文案单、包装图、主体框选、OCR、规则比对、DeepSeek 语义复核与报告生成</text><rect x="60" y="132" width="1080" height="46" rx="18" fill="#10231f"/><text x="82" y="161" font-family="Arial Unicode MS, PingFang SC, sans-serif" font-size="15" fill="white">图例：深色 = 小程序/云函数 ｜ 绿色 = 识别与语义复核 ｜ 浅色 = 数据与报告 ｜ 箭头 = 主要依赖</text><rect x="60" y="215" width="245" height="340" rx="24" fill="#10231f" filter="url(#shadow)"/><text x="84" y="257" font-family="Arial Unicode MS, PingFang SC, sans-serif" font-size="18" font-weight="700" fill="#dff23d">小程序前端</text><rect x="78" y="293" width="209" height="56" rx="14" fill="rgba(255,255,255,.09)" stroke="#ffffff33"/><text x="92" y="327" font-family="Arial Unicode MS, PingFang SC, sans-serif" font-size="14" fill="white">首页素材上传</text><rect x="78" y="371" width="209" height="56" rx="14" fill="rgba(255,255,255,.09)" stroke="#ffffff33"/><text x="92" y="405" font-family="Arial Unicode MS, PingFang SC, sans-serif" font-size="14" fill="white">主体文案框选</text><rect x="78" y="449" width="209" height="56" rx="14" fill="rgba(255,255,255,.09)" stroke="#ffffff33"/><text x="92" y="483" font-family="Arial Unicode MS, PingFang SC, sans-serif" font-size="14" fill="white">报告页 / 扫一扫</text><line x1="310" y1="385" x2="328" y2="385" stroke="#0f5c4d" stroke-width="3" marker-end="url(#arrow)"/><rect x="333" y="215" width="245" height="340" rx="24" fill="#10231f" filter="url(#shadow)"/><text x="357" y="257" font-family="Arial Unicode MS, PingFang SC, sans-serif" font-size="18" font-weight="700" fill="#dff23d">云开发层</text><rect x="351" y="293" width="209" height="56" rx="14" fill="rgba(255,255,255,.09)" stroke="#ffffff33"/><text x="365" y="327" font-family="Arial Unicode MS, PingFang SC, sans-serif" font-size="14" fill="white">云存储素材</text><rect x="351" y="371" width="209" height="56" rx="14" fill="rgba(255,255,255,.09)" stroke="#ffffff33"/><text x="365" y="405" font-family="Arial Unico