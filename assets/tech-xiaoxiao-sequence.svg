icode MS, PingFang SC, sans-serif" font-size="11" fill="#10231f">06 记录 route / tool / latency</text><line x1="700" y1="502" x2="495" y2="502" stroke="#0f5c4d" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="492.5" y="478" width="210" height="22" rx="9" fill="#f7f3ea"/><text x="597.5" y="493" text-anchor="middle" font-family="Arial Unicode MS, PingFang SC, sans-serif" font-size="11" fill="#10231f">07 token + order_status card</text><line x1="495" y1="549" x2="290" y2="549" stroke="#0f5c4d" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="287.5" y="525" width="210" height="22" rx="9" fill="#f7f3ea"/><text x="392.5" y="540" text-anchor="middle" font-family="Arial Unicode MS, PingFang SC, sans-serif" font-size="11" fill="#10231f">08 NDJSON 流式返回</text><line x1="290" y1="596" x2="85" y2="596" stroke="#0f5c4d" stroke-width="2.4" marker-end="url(#arrow)"/><rect x="82.5" y="572" width="210" height="22" rx="9" fill="#f7f3ea"/><text x="187.5" y="587" text-anchor="middle" font-family="Arial Unicode MS, PingFang SC, sans-serif" font-size="11" fill="#10231f">09 可解释结果；异常则转人工</text></svg>